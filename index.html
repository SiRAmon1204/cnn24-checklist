<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCN24 Checklist</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Sarabun,sans-serif;background:#f7f7f5;color:#1a1a1a;font-size:14px;min-height:100vh}

/* Top bar */
.topbar{background:#fff;border-bottom:1px solid #e8e8e4;padding:16px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.topbar h1{font-size:16px;font-weight:700}
.topbar p{font-size:11px;color:#999;margin-top:2px}
.progress-wrap{display:flex;align-items:center;gap:10px;flex-shrink:0}
.progress-bar{width:140px;height:8px;background:#eee;border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:#1a1a1a;border-radius:99px;transition:width .3s}
.progress-label{font-size:12px;font-weight:700;color:#1a1a1a;min-width:44px;text-align:right}

/* Tabs */
.tabs{display:flex;gap:0;background:#fff;border-bottom:1px solid #e8e8e4;padding:0 20px}
.tab{padding:12px 18px;font-size:13px;font-weight:600;color:#999;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;font-family:Sarabun,sans-serif;background:none;border-top:none;border-left:none;border-right:none}
.tab:hover{color:#333}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a}

/* Controls */
.controls{padding:12px 20px;display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:#fff;border-bottom:1px solid #f0f0eb}
.filter-btn{font-size:12px;padding:5px 12px;border:1.5px solid #ddd;border-radius:20px;background:#fff;color:#555;cursor:pointer;font-family:Sarabun,sans-serif;transition:all .15s}
.filter-btn:hover{border-color:#999;color:#111}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.spacer{flex:1}
.reset-btn{font-size:11px;color:#bbb;cursor:pointer;background:none;border:none;font-family:Sarabun,sans-serif}
.reset-btn:hover{color:#e44}

/* Content */
.content{padding:16px 20px;display:flex;flex-direction:column;gap:12px}

/* Subject section */
.subject-block{background:#fff;border-radius:12px;border:1px solid #e8e8e4;overflow:hidden}
.subject-header{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;user-select:none}
.subject-header:hover{background:#fafafa}
.subj-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0}
.subj-title{font-size:14px;font-weight:700;flex:1}
.subj-count{font-size:11px;color:#bbb;flex-shrink:0}
.subj-chevron{font-size:14px;color:#ccc;transition:transform .2s;flex-shrink:0}
.subject-block.open .subj-chevron{transform:rotate(180deg)}
.topics-list{display:none;border-top:1px solid #f0f0eb}
.subject-block.open .topics-list{display:block}

/* Topic item */
.topic-item{display:flex;align-items:flex-start;gap:12px;padding:11px 16px;border-bottom:1px solid #f7f7f5;cursor:pointer;transition:background .1s}
.topic-item:last-child{border-bottom:none}
.topic-item:hover{background:#fafafa}
.topic-item.checked{background:#f8fdf9}
.checkbox{width:20px;height:20px;border:2px solid #ddd;border-radius:6px;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.topic-item.checked .checkbox{background:#1a1a1a;border-color:#1a1a1a}
.checkmark{color:#fff;font-size:12px;display:none}
.topic-item.checked .checkmark{display:block}
.topic-text{font-size:13px;line-height:1.5;color:#333}
.topic-item.checked .topic-text{color:#aaa;text-decoration:line-through}

/* Exam section */
.exam-block{background:#fff;border-radius:12px;border:1px solid #e8e8e4;overflow:hidden}
.exam-header-row{padding:14px 16px;font-size:14px;font-weight:700;border-bottom:1px solid #f0f0eb;display:flex;align-items:center;gap:8px}
.exam-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f7f7f5;cursor:pointer;transition:background .1s}
.exam-item:last-child{border-bottom:none}
.exam-item:hover{background:#fafafa}
.exam-item.checked{background:#fffdf5}
.exam-info{flex:1}
.exam-name{font-size:13px;font-weight:700;color:#1a1a1a}
.exam-item.checked .exam-name{color:#bbb;text-decoration:line-through}
.exam-date{font-size:12px;color:#888;margin-top:2px}
.exam-item.checked .exam-date{color:#ccc}
.exam-badge{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;flex-shrink:0}
.exam-check{width:22px;height:22px;border:2px solid #ddd;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s}
.exam-item.checked .exam-check{background:#B45309;border-color:#B45309}
.exam-item.checked .exam-check::after{content:'✓';color:#fff;font-size:13px}
.exam-tag{font-size:10px;background:#FFF3CD;color:#B45309;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:6px}

/* subject color themes */
.b101{background:#f4f3ff;color:#534AB7}
.b102{background:#EAF3FD;color:#185FA5}
.b103{background:#E5F7F1;color:#0F6E56}
.b104{background:#FEF5E8;color:#854F0B}
.b105{background:#FEF0EA;color:#993C1D}
.b108{background:#FEF0F5;color:#993556}

/* empty state */
.empty{text-align:center;padding:40px 20px;color:#ccc;font-size:13px}
</style>
</head>
<body>

<div class="topbar">
  <div>
    <h1>CCN24 Checklist</h1>
    <p>การพยาบาลผู้ป่วยวิกฤต รุ่นที่ 24 · คณะพยาบาลศาสตร์ มช.</p>
  </div>
  <div class="progress-wrap">
    <span id="saveStatus" style="font-size:11px;transition:color .3s;min-width:80px;text-align:right"></span>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-label" id="progressLabel">0%</div>
  </div>
</div>

<!-- Debug panel -->
<div id="diagPanel" style="display:none;margin:0 20px 0;background:#fff;border:1px solid #e8e8e4;border-radius:12px;overflow:hidden">
  <div style="padding:12px 16px;border-bottom:1px solid #f0f0eb;display:flex;align-items:center;justify-content:space-between">
    <span style="font-size:13px;font-weight:700">🔍 ตรวจสอบ localStorage</span>
    <button onclick="document.getElementById('diagPanel').style.display='none'" style="font-size:12px;color:#bbb;background:none;border:none;cursor:pointer">ปิด</button>
  </div>
  <div id="diagOut" style="padding:14px 16px;font-size:12px;color:#888">กด "ตรวจสอบ" เพื่อเริ่ม</div>
  <div style="padding:0 16px 14px;display:flex;gap:8px">
    <button onclick="runDiag()" style="font-size:12px;padding:6px 14px;background:#1a1a1a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:Sarabun,sans-serif">ตรวจสอบ</button>
    <button onclick="forceReload()" style="font-size:12px;padding:6px 14px;background:#fff;color:#555;border:1px solid #ddd;border-radius:8px;cursor:pointer;font-family:Sarabun,sans-serif">โหลด state ใหม่</button>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('topics',this)">หัวข้อที่เรียน</button>
  <button class="tab" onclick="switchTab('exams',this)">ตารางสอบ</button>
  <button class="tab" onclick="toggleDiag()" style="margin-left:auto;color:#bbb;font-size:12px">🔍 Debug</button>
</div>

<div id="tabTopics">
  <div class="controls">
    <button class="filter-btn active" onclick="filterSubj('all',this)">ทั้งหมด</button>
    <button class="filter-btn" onclick="filterSubj('101',this)">CCN101</button>
    <button class="filter-btn" onclick="filterSubj('102',this)">CCN102</button>
    <button class="filter-btn" onclick="filterSubj('103',this)">CCN103</button>
    <button class="filter-btn" onclick="filterSubj('104',this)">CCN104</button>
    <button class="filter-btn" onclick="filterSubj('105',this)">CCN105</button>
    <button class="filter-btn" onclick="filterSubj('108',this)">CCN108</button>
    <div class="spacer"></div>
    <button class="filter-btn" onclick="filterDone('undone',this)" id="btnUndone">ยังไม่เรียน</button>
    <button class="reset-btn" onclick="resetTopics()">รีเซ็ต</button>
  </div>
  <div class="content" id="topicsContent"></div>
</div>

<div id="tabExams" style="display:none">
  <div class="controls">
    <button class="reset-btn" onclick="resetExams()">รีเซ็ตทั้งหมด</button>
  </div>
  <div class="content" id="examsContent"></div>
</div>

let topicState={};
let examState={};

function key(subj,i){return `t_${subj}_${i}`;}
function ekey(i){return `e_${i}`;}

function load(){
  try{
    const ts=localStorage.getItem('ccn24_topics');
    if(ts) topicState=JSON.parse(ts);
    const es=localStorage.getItem('ccn24_exams');
    if(es) examState=JSON.parse(es);
  }catch(e){}
}
function save(){
  try{
    localStorage.setItem('ccn24_topics',JSON.stringify(topicState));
    localStorage.setItem('ccn24_exams',JSON.stringify(examState));
    showSaveStatus(true);
  }catch(e){
    showSaveStatus(false,e);
  }
}

function showSaveStatus(ok, err){
  const el=document.getElementById('saveStatus');
  if(!el) return;
  if(ok){
    el.textContent='✓ บันทึกแล้ว';
    el.style.color='#16a34a';
  } else {
    el.textContent='✗ บันทึกไม่ได้: '+(err||'');
    el.style.color='#dc2626';
  }
  clearTimeout(el._t);
  el._t=setTimeout(()=>el.textContent='',2000);
}

async function runDiag(){
  const out=document.getElementById('diagOut');
  out.innerHTML='<div style="color:#888">กำลังตรวจสอบ...</div>';
  const lines=[];

  // 1. localStorage available?
  let lsOk=false;
  try{
    localStorage.setItem('__diag__','1');
    lsOk=localStorage.getItem('__diag__')==='1';
    localStorage.removeItem('__diag__');
  }catch(e){lsOk=false;}
  lines.push(row(lsOk,'localStorage ใช้งานได้',lsOk?'':'เบราว์เซอร์บล็อก localStorage (อาจเป็น Safari/Private mode)'));

  // 2. Existing keys?
  const tVal=localStorage.getItem('ccn24_topics');
  const eVal=localStorage.getItem('ccn24_exams');
  const tExist=tVal!==null;
  const eExist=eVal!==null;
  lines.push(row(tExist,'พบ key ccn24_topics',tExist?'มีข้อมูล: '+Object.keys(JSON.parse(tVal)||{}).length+' รายการ':'ไม่พบ key นี้ใน localStorage'));
  lines.push(row(eExist,'พบ key ccn24_exams',eExist?'มีข้อมูล: '+Object.keys(JSON.parse(eVal)||{}).length+' รายการ':'ไม่พบ key นี้ใน localStorage'));

  // 3. Write-read test
  let wrOk=false;
  try{
    const t=Date.now().toString();
    localStorage.setItem('__wr__',t);
    wrOk=localStorage.getItem('__wr__')===t;
    localStorage.removeItem('__wr__');
  }catch(e){}
  lines.push(row(wrOk,'เขียน-อ่านข้อมูลได้',wrOk?'':'ไม่สามารถเขียนได้'));

  // 4. Storage quota
  let quota='ไม่ทราบ';
  try{
    if(navigator.storage&&navigator.storage.estimate){
      const est=await navigator.storage.estimate();
      const used=Math.round(est.usage/1024);
      const total=Math.round(est.quota/1024);
      quota=`${used} KB / ${total} KB`;
    }
  }catch(e){}
  lines.push(rowInfo('Storage quota',quota));

  // 5. Origin
  lines.push(rowInfo('Origin (URL)',location.origin));

  // 6. Browser
  lines.push(rowInfo('Browser',navigator.userAgent.split(' ').slice(-2).join(' ')));

  // 7. Suggest
  let suggest='';
  if(!lsOk) suggest='⚠️ localStorage ถูกบล็อก — ลองใช้ Chrome และปิด Private mode';
  else if(!tExist&&!eExist) suggest='⚠️ ยังไม่มีข้อมูลบันทึก — ลองติ๊ก checkbox แล้วเปิดใหม่';
  else suggest='✅ localStorage ดูปกติ — ถ้ายังหาย ลองล้าง cache browser แล้วใช้ใหม่';

  out.innerHTML=`<div style="display:flex;flex-direction:column;gap:6px">${lines.join('')}</div>
    <div style="margin-top:12px;padding:10px 12px;background:#f0f9ff;border-radius:8px;font-size:12px;color:#0369a1">${suggest}</div>`;
}

function row(ok,label,detail){
  return `<div style="display:flex;align-items:flex-start;gap:8px;font-size:12px">
    <span style="font-size:14px;flex-shrink:0">${ok?'✅':'❌'}</span>
    <div><div style="font-weight:600;color:${ok?'#166534':'#991b1b'}">${label}</div>
    ${detail?`<div style="color:#666;margin-top:1px">${detail}</div>`:''}</div></div>`;
}
function rowInfo(label,val){
  return `<div style="display:flex;align-items:flex-start;gap:8px;font-size:12px">
    <span style="font-size:14px;flex-shrink:0">ℹ️</span>
    <div><span style="font-weight:600;color:#374151">${label}:</span> <span style="color:#6b7280">${val}</span></div></div>`;
}

function totalTopics(){return SUBJECTS.reduce((a,s)=>a+s.topics.length,0);}
function checkedTopics(){return Object.values(topicState).filter(Boolean).length;}
function checkedExams(){return EXAMS.filter((_,i)=>examState[ekey(i)]).length;}

function updateProgress(){
  const tTotal=totalTopics();
  const tDone=checkedTopics();
  const pct=tTotal?Math.round(tDone/tTotal*100):0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressLabel').textContent=tDone+'/'+tTotal;
}

function toggleTopic(subj,i){
  const k=key(subj,i);
  topicState[k]=!topicState[k];
  save();
  renderTopics();
  updateProgress();
}
function toggleExam(i){
  const k=ekey(i);
  examState[k]=!examState[k];
  save();
  renderExams();
}

function filterSubj(v,btn){
  subjFilter=v;
  document.querySelectorAll('.controls .filter-btn').forEach(b=>b.classList.remove('active'));
  // reset done filter when changing subj
  doneFilter=false;
  document.getElementById('btnUndone').classList.remove('active');
  if(btn) btn.classList.add('active');
  renderTopics();
}
function filterDone(v,btn){
  doneFilter=!doneFilter;
  btn.classList.toggle('active',doneFilter);
  renderTopics();
}

function resetTopics(){
  if(!confirm('รีเซ็ตทุกหัวข้อที่ติ๊กไว้?')) return;
  topicState={};save();renderTopics();updateProgress();
}
function resetExams(){
  if(!confirm('รีเซ็ตตารางสอบทั้งหมด?')) return;
  examState={};save();renderExams();
}

function renderTopics(){
  const el=document.getElementById('topicsContent');
  let html='';
  let any=false;
  SUBJECTS.forEach(subj=>{
    if(subjFilter!=='all'&&subjFilter!==subj.id) return;
    const topics=doneFilter
      ? subj.topics.filter((_,i)=>!topicState[key(subj.id,i)])
      : subj.topics;
    if(doneFilter&&topics.length===0) return;
    any=true;
    const done=subj.topics.filter((_,i)=>topicState[key(subj.id,i)]).length;
    const total=subj.topics.length;
    html+=`<div class="subject-block open" id="sb_${subj.id}">
      <div class="subject-header" onclick="toggleBlock('sb_${subj.id}')">
        <span class="subj-badge ${BADGE[subj.id]}">CCN${subj.id}</span>
        <span class="subj-title">${subj.name}</span>
        <span class="subj-count">${done}/${total}</span>
        <span class="subj-chevron">▾</span>
      </div>
      <div class="topics-list">`;
    subj.topics.forEach((tp,i)=>{
      if(doneFilter&&topicState[key(subj.id,i)]) return;
      const checked=!!topicState[key(subj.id,i)];
      const name=typeof tp==='object'?tp.t:tp;
      const date=typeof tp==='object'?tp.d:'';
      const time=typeof tp==='object'?tp.time:'';
      const tc=typeof tp==='object'?tp.tc:'';
      html+=`<div class="topic-item${checked?' checked':''}" onclick="toggleTopic('${subj.id}',${i})">
        <div class="checkbox"><span class="checkmark">✓</span></div>
        <div style="display:flex;flex-direction:column;gap:3px;flex:1">
          <div class="topic-text">${name}</div>
          ${date?`<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
            <span style="background:#f0f0eb;color:#888;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap">${date}</span>
            ${time?`<span style="font-size:11px;color:#bbb">${time}</span>`:''}
          </div>`:''}
          ${tc?`<div style="font-size:11px;color:#bbb">${tc}</div>`:''}
        </div>
      </div>`;
    });
    html+='</div></div>';
  });
  if(!any) html='<div class="empty">ไม่มีหัวข้อที่ตรงกับตัวกรอง</div>';
  el.innerHTML=html;
}

function renderExams(){
  const el=document.getElementById('examsContent');
  const done=checkedExams();
  let html=`<div class="exam-block">
    <div class="exam-header-row">📝 ตารางสอบทั้งหมด 9 ครั้ง &nbsp;<span style="font-size:11px;font-weight:400;color:#bbb">${done}/9 เสร็จแล้ว</span></div>`;
  EXAMS.forEach((ex,i)=>{
    const checked=!!examState[ekey(i)];
    html+=`<div class="exam-item${checked?' checked':''}" onclick="toggleExam(${i})">
      <div class="exam-check"></div>
      <div class="exam-info">
        <div class="exam-name">${ex.name}${ex.round?'<span class="exam-tag">'+ex.round+'</span>':''}</div>
        <div class="exam-date">
          <span style="background:#FFF3CD;color:#B45309;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-right:6px">${ex.date}</span>
          ${ex.time} &nbsp;·&nbsp; ${ex.room}
        </div>
      </div>
      <span class="exam-badge ${BADGE[ex.code]}">CCN${ex.code}</span>
    </div>`;
  });
  html+='</div>';
  el.innerHTML=html;
}

function toggleBlock(id){
  document.getElementById(id).classList.toggle('open');
}

function switchTab(tab,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabTopics').style.display=tab==='topics'?'':'none';
  document.getElementById('tabExams').style.display=tab==='exams'?'':'none';
}

function toggleDiag(){
  const p=document.getElementById('diagPanel');
  p.style.display=p.style.display==='none'?'block':'none';
  if(p.style.display==='block') runDiag();
}
function forceReload(){
  topicState={};examState={};
  load();
  renderTopics();renderExams();updateProgress();
  document.getElementById('diagOut').innerHTML='<div style="color:#16a34a;font-size:12px">✅ โหลด state ใหม่จาก localStorage แล้ว</div>';
}

load();
renderTopics();
renderExams();
updateProgress();
</script>
</body>
</html>
